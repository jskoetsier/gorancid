TERM=network;export TERM
LC_COLLATE="POSIX"; export LC_COLLATE
umask 027
BASEDIR=/usr/local/rancid/var; export BASEDIR
PATH=/usr/local/rancid/bin:/usr/bin:/bin; export PATH
SENDMAIL=/usr/sbin/sendmail
CVSROOT=/usr/local/rancid/var/CVS; export CVSROOT
LOGDIR=/usr/local/rancid/var/logs; export LOGDIR
RCSSYS=git; export RCSSYS
LIST_OF_GROUPS="core edge dmz"; export LIST_OF_GROUPS
PAR_COUNT=10; export PAR_COUNT
OLDTIME=24; export OLDTIME
FILTER_PWDS=YES; export FILTER_PWDS
NOCOMMSTR=YES; export NOCOMMSTR
