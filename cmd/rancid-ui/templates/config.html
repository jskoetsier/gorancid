<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>{{.Title}} — rancid-ui</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism.min.css" crossorigin="anonymous" referrerpolicy="no-referrer"/>
  <style>
    body { font-family: system-ui, sans-serif; margin: 1rem 2rem; color: #111; }
    a { color: #0645ad; }
    .path { font-size: 0.85rem; color: #444; word-break: break-all; }
  </style>
</head>
<body>
  <p><a href="/">Fleet</a> · <a href="/group/{{.Group}}">Group {{.Group}}</a></p>
  <h1>{{.Host}}</h1>
  <p class="path">{{.Path}}</p>
  <p><a href="/group/{{.Group}}/device/{{.Host}}/diff">View last git diff</a></p>
  <pre><code class="language-bash">{{.Content}}</code></pre>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-bash.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <script>Prism.highlightAll();</script>
</body>
</html>
