stages:
  - test
  - build

variables:
  GO_IMAGE: golang:1.25-bookworm

test:
  stage: test
  image: $GO_IMAGE
  variables:
    CGO_ENABLED: "1"
  script:
    - go test ./... -v -race
  rules:
    - when: always

build:
  stage: build
  image: $GO_IMAGE
  variables:
    CGO_ENABLED: "0"
  script:
    - mkdir -p bin
    - GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o bin/rancid-cvs-linux-amd64 ./cmd/rancid-cvs/
    - GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o bin/control-rancid-linux-amd64 ./cmd/control-rancid/
    - GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o bin/rancid-run-linux-amd64 ./cmd/rancid-run/
    - GOOS=linux GOARCH=arm64 go build -ldflags="-s -w" -o bin/rancid-cvs-linux-arm64 ./cmd/rancid-cvs/
    - GOOS=linux GOARCH=arm64 go build -ldflags="-s -w" -o bin/control-rancid-linux-arm64 ./cmd/control-rancid/
    - GOOS=linux GOARCH=arm64 go build -ldflags="-s -w" -o bin/rancid-run-linux-arm64 ./cmd/rancid-run/
  artifacts:
    paths:
      - bin/
    expire_in: 30 days
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
